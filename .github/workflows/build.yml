name: build

# CI build matrix for the ReXGlue SDK across the platforms it targets.
# The SDK is self-contained (no game assets needed), so these jobs build the
# real runtime library and upload it as an artifact.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux-amd64:
    name: Linux AMD64 (Clang)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install toolchain and deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang lld ninja-build pkg-config \
            libc++-dev libc++abi-dev \
            libgtk-3-dev libx11-xcb-dev libxcb1-dev
          clang --version

      - uses: lukka/get-cmake@latest

      # The SDK targets libc++ on Unix (it force-adds -fexperimental-library for
      # std::jthread/stop_token, and uses std::expected). Build against libc++.
      - name: Configure
        run: >
          cmake --preset linux-amd64
          -DCMAKE_CXX_FLAGS="-march=x86-64-v3 -stdlib=libc++"
          -DCMAKE_EXE_LINKER_FLAGS="-stdlib=libc++"
          -DCMAKE_SHARED_LINKER_FLAGS="-stdlib=libc++"
          -DCMAKE_MODULE_LINKER_FLAGS="-stdlib=libc++"

      - name: Build (Release)
        run: cmake --build --preset linux-amd64-release

      - name: Upload runtime library
        uses: actions/upload-artifact@v4
        with:
          name: rexglue-linux-amd64
          if-no-files-found: warn
          path: |
            out/linux-amd64/**/*.so
            out/linux-amd64/**/*.a

  windows-amd64:
    name: Windows AMD64 (Clang)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      # clang targeting the MSVC ABI needs the MSVC headers/libs + Windows SDK
      # on PATH/INCLUDE/LIB, which this action exports into the job environment.
      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Add LLVM to PATH
        shell: pwsh
        run: |
          echo "C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          & "C:\Program Files\LLVM\bin\clang.exe" --version

      - uses: lukka/get-cmake@latest

      - name: Configure
        run: cmake --preset win-amd64

      - name: Build (Release)
        run: cmake --build --preset win-amd64-release

      - name: Upload runtime library
        uses: actions/upload-artifact@v4
        with:
          name: rexglue-windows-amd64
          if-no-files-found: warn
          path: |
            out/win-amd64/**/*.dll
            out/win-amd64/**/*.lib
            out/win-amd64/**/*.exe

  android-arm64:
    name: Android arm64-v8a (NDK)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install host build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ninja-build pkg-config

      - uses: lukka/get-cmake@latest

      - name: Set up Android NDK
        id: ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27c
          local-cache: true

      - name: Configure (arm64-v8a)
        env:
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
        run: >
          cmake -S . -B out/build/android-arm64 -G Ninja
          -DCMAKE_TOOLCHAIN_FILE="$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake"
          -DANDROID_ABI=arm64-v8a
          -DANDROID_PLATFORM=android-29
          -DCMAKE_BUILD_TYPE=Release

      # The rexruntime shared library is what the game's libge.so links against.
      # The rexglue codegen CLI is a host-only tool and is not cross-built here.
      - name: Build runtime (rexruntime)
        run: cmake --build out/build/android-arm64 --target rexruntime

      - name: Upload runtime library
        uses: actions/upload-artifact@v4
        with:
          name: rexglue-android-arm64-v8a
          if-no-files-found: warn
          path: out/android-arm64-v8a/**/*.so
